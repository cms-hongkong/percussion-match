<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 樂器小森林 | 聲音配對遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fffaf0; /* 溫暖奶油色 */
            --primary-pink: #ff9a9e; /* 粉嫩紅 */
            --primary-blue: #a1c4fd; /* 夢幻藍 */
            --correct-green: #81c784; /* 薄荷綠 */
            --accent-orange: #ffb74d; /* 活力橘 */
            --text-color: #5d4037; /* 巧克力深棕 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'ZCOOL KuaiLe', 'Microsoft JhengHei', cursive;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffe082 1px, transparent 1px);
            background-size: 30px 30px; /* 可愛圓點背景 */
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 15px 0px #f0d5a0; /* 3D 立體底座感 */
            border: 5px solid var(--text-color);
            position: relative;
        }

        /* 標題區域 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 4px dashed #eee;
        }

        h1 {
            color: var(--primary-pink);
            font-size: 42px;
            text-shadow: 3px 3px 0px #fff, 5px 5px 0px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .subtitle {
            background: #fff0f0;
            color: #d47a7d;
            font-size: 18px;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: bold;
        }

        /* 遊戲說明 */
        .instructions {
            background: #f0f7ff;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 30px;
            border: 3px solid var(--primary-blue);
        }

        .instructions h3 {
            color: #1a73e8;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .test-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .test-btn {
            padding: 6px 12px;
            background: #d1c4e9;
            color: #512da8;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .test-btn:hover { background: #b39ddb; }

        /* 遊戲區域佈局 */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .game-area { grid-template-columns: 1fr; }
        }

        /* 音頻區域 */
        .audio-section {
            background: #fff9f0;
            border-radius: 30px;
            padding: 25px;
            border: 4px solid var(--accent-orange);
            box-shadow: 8px 8px 0px var(--accent-orange);
        }

        .audio-section h2 { text-align: center; margin-bottom: 15px; color: var(--accent-orange); }

        .sound-player {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid #eee;
        }

        .sound-title { font-size: 20px; margin-bottom: 15px; }

        .audio-btn {
            background: var(--primary-pink);
            border: none;
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 6px 0px #d47a7d;
            transition: all 0.1s;
            margin: 5px;
        }

        .audio-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px #d47a7d; }
        .audio-btn.playing { background: var(--primary-blue); box-shadow: 0 6px 0px #7b9acc; }

        .other-sounds h3 { font-size: 16px; margin: 20px 0 10px; color: #888; text-align: center; }

        .other-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .other-btn {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .other-btn:hover { border-color: var(--primary-blue); background: #f0f7ff; }

        /* 圖片區域 */
        .images-section {
            background: #fff;
            border-radius: 30px;
            padding: 20px;
            border: 4px solid #eee;
        }

        .images-section h2 { text-align: center; margin-bottom: 15px; color: var(--primary-blue); }

        .images-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .image-container { text-align: center; }

        .instrument-image {
            width: 100%;
            height: 120px;
            object-fit: contain;
            cursor: pointer;
            border: 4px solid #f9f9f9;
            background: #fff;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
        }

        .instrument-image:hover { transform: scale(1.05) rotate(2deg); border-color: var(--primary-pink); }
        .instrument-image.selected { border-color: var(--correct-green); background: #e8f5e green; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .image-name {
            display: inline-block;
            margin-top: 5px;
            background: var(--text-color);
            color: white;
            padding: 2px 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* 下方控制按鈕 */
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-size: 22px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }

        .check-btn { background: var(--correct-green); box-shadow: 0 8px 0px #66a669; }
        .reset-btn { background: var(--accent-orange); box-shadow: 0 8px 0px #e6a543; }
        .next-btn { background: var(--primary-blue); box-shadow: 0 8px 0px #8ba7d6; }

        .control-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
        .control-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.1); }
        .control-btn:disabled { background: #ccc; box-shadow: 0 8px 0px #bbb; cursor: not-allowed; opacity: 0.7; }

        /* 結果顯示區域 */
        .result-section {
            text-align: center;
            margin: 30px 0;
            padding: 25px;
            border-radius: 30px;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .result-section.show { display: block; }
        .result-correct { background: #e8f5e9; border: 4px solid var(--correct-green); }
        .result-incorrect { background: #fff1f0; border: 4px solid var(--primary-pink); }

        .result-icon { font-size: 60px; margin-bottom: 10px; animation: bounce 1s infinite; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 分數與進度 */
        .score-board {
            background: var(--text-color);
            color: white;
            padding: 25px;
            border-radius: 35px;
            text-align: center;
        }

        .progress-bar {
            height: 25px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            margin: 15px 0;
            border: 3px solid white;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4);
            width: 0%;
            transition: width 0.5s ease;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 2px dashed #ccc;
            color: #888;
            font-size: 14px;
        }

        .error-message { color: #f44336; font-size: 14px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 樂器小森林 🎵</h1>
            <p class="subtitle">聽一聽聲音，哪一個是它的主人呢？</p>
        </div>
        
        <div class="instructions">
            <h3>📋 怎麼玩？</h3>
            <p>1. 點擊粉紅色的「播放」按鈕聽聽樂器聲<br>
               2. 在右邊點選你覺得正確的樂器圖片<br>
               3. 點擊綠色的「檢查答案」！</p>
            <div class="test-buttons">
                <button class="test-btn" onclick="testAllAudios()">音頻測試</button>
                <button class="test-btn" onclick="testAllImages()">圖片測試</button>
                <button class="test-btn" onclick="showFileList()">檔案列表</button>
            </div>
        </div>
        
        <div class="game-area">
            <div class="audio-section">
                <h2>🔊 聽聲音</h2>
                <div class="sound-player">
                    <div class="sound-title" id="soundTitle">
                        當前挑戰：<span id="currentSoundNumber" style="color:var(--primary-pink)">第 1 題</span>
                    </div>
                    <div class="audio-controls">
                        <button class="audio-btn" id="playCurrentBtn">▶️ 播放當前聲音</button>
                        <button class="audio-btn" id="playRandomBtn" style="background:var(--primary-blue); box-shadow: 0 6px 0px #7b9acc;">🎲 隨機練習</button>
                    </div>
                    <div id="audioError" class="error-message">❌ 音頻加載失敗</div>
                </div>
                
                <div class="other-sounds">
                    <h3>🔍 聽聽看其他樂器：</h3>
                    <div class="other-buttons" id="otherButtons"></div>
                </div>
            </div>
            
            <div class="images-section">
                <h2>🎻 找樂器</h2>
                <div class="images-grid" id="imagesGrid"></div>
                <div id="imageError" class="error-message">❌ 部分圖片加載失敗</div>
            </div>
        </div>
        
        <div class="control-buttons">
            <button class="control-btn check-btn" id="checkBtn" disabled>✅ 檢查答案</button>
            <button class="control-btn reset-btn" id="resetBtn">🔄 重新開始</button>
            <button class="control-btn next-btn" id="nextBtn" disabled>⏭️ 下一題</button>
        </div>
        
        <div class="result-section" id="resultSection">
            <div class="result-icon" id="resultIcon">🎉</div>
            <h2 id="resultTitle">答案正確！</h2>
            <p id="resultText">你好棒！</p>
            <div id="instrumentInfo" style="margin-top: 15px; font-size: 16px; line-height: 1.5;"></div>
        </div>
        
        <div class="score-board">
            <div style="font-size: 24px;">🏆 得分：<span id="score">0</span> / <span id="total">7</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="gameStatus" style="font-size: 14px; opacity: 0.8;">準備開始遊戲...</div>
        </div>
        
        <footer>
            <p>樂器配對遊戲 | 適合音樂啟蒙教育</p>
            <p>三角、雙擊木、銅鈸、砂槌、馬鈴、小鼓、搖鼓</p>
        </footer>
    </div>

    

[Image of X]
 (這裡會根據您的檔案顯示樂器圖片)

    <script>
        const instruments = [
            { id: 'triangle', name: '三角', audioFile: 'triangle.mp3', imageFile: 'triangle.jpg', description: '三角鐵是金屬製成的，聲音亮晶晶的，像星星一樣！' },
            { id: 'claves', name: '雙擊木', audioFile: 'claves.mp3', imageFile: 'claves.jpg', description: '兩根木棒敲在一起，發出咚咚的乾脆聲音。' },
            { id: 'cymbal', name: '銅鈸', audioFile: 'cymbal.mp3', imageFile: 'cymbal.jpg', description: '兩片大大的銅盤撞在一起，聲音非常響亮！' },
            { id: 'maracas', name: '砂槌', audioFile: 'maracas.mp3', imageFile: 'maracas.jpg', description: '裡面裝了小沙子，搖一搖就會發出沙沙聲。' },
            { id: 'sleigh_bells', name: '馬鈴', audioFile: 'sleigh_bells.mp3', imageFile: 'sleigh_bells.jpg', description: '叮叮噹、叮叮噹，就像聖誕老人來的聲音！' },
            { id: 'snare_drum', name: '小鼓', audioFile: 'snare_drum.mp3', imageFile: 'snare_drum.jpg', description: '嗒嗒嗒嗒！很有精神的鼓聲。' },
            { id: 'tam', name: '搖鼓', audioFile: 'tam.mp3', imageFile: 'tam.jpg', description: '旁邊有許多小鈴片，敲一下搖一下，非常熱鬧。' }
        ];

        let gameState = {
            currentSound: null,
            selectedImage: null,
            score: 0,
            totalQuestions: instruments.length,
            answeredQuestions: 0,
            gameInProgress: true,
            availableInstruments: [...instruments],
            usedSounds: []
        };

        const imagesGrid = document.getElementById('imagesGrid');
        const playCurrentBtn = document.getElementById('playCurrentBtn');
        const playRandomBtn = document.getElementById('playRandomBtn');
        const otherButtons = document.getElementById('otherButtons');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resultSection = document.getElementById('resultSection');
        const scoreElement = document.getElementById('score');
        const progressFill = document.getElementById('progressFill');
        const gameStatus = document.getElementById('gameStatus');

        let currentAudio = null;

        function initGame() {
            gameState = {
                currentSound: null,
                selectedImage: null,
                score: 0,
                totalQuestions: instruments.length,
                answeredQuestions: 0,
                gameInProgress: true,
                availableInstruments: [...instruments],
                usedSounds: []
            };
            updateScore();
            updateProgress();
            resultSection.classList.remove('show');
            checkBtn.disabled = true;
            nextBtn.disabled = true;
            createImageGrid();
            createOtherButtons();
            setTimeout(selectRandomSound, 1000);
        }

        function createImageGrid() {
            imagesGrid.innerHTML = '';
            const shuffled = [...instruments].sort(() => Math.random() - 0.5);
            shuffled.forEach(inst => {
                const container = document.createElement('div');
                container.className = 'image-container';
                const img = document.createElement('img');
                img.className = 'instrument-image';
                img.src = inst.imageFile;
                img.dataset.id = inst.id;
                img.onclick = () => selectImage(inst.id);
                img.onerror = () => { img.src = `https://via.placeholder.com/100?text=${inst.name}`; };
                
                const nameLabel = document.createElement('div');
                nameLabel.className = 'image-name';
                nameLabel.textContent = inst.name;
                
                container.appendChild(img);
                container.appendChild(nameLabel);
                imagesGrid.appendChild(container);
            });
        }

        function createOtherButtons() {
            otherButtons.innerHTML = '';
            instruments.forEach(inst => {
                const btn = document.createElement('button');
                btn.className = 'other-btn';
                btn.textContent = inst.name;
                btn.onclick = () => playSound(inst.id, false);
                otherButtons.appendChild(btn);
            });
        }

        function selectRandomSound() {
            if (!gameState.gameInProgress) return;
            const remaining = gameState.availableInstruments.filter(i => !gameState.usedSounds.includes(i.id));
            if (remaining.length === 0) return;
            
            const selected = remaining[Math.floor(Math.random() * remaining.length)];
            gameState.currentSound = selected.id;
            gameState.usedSounds.push(selected.id);
            document.getElementById('currentSoundNumber').textContent = `第 ${gameState.usedSounds.length} 題`;
            gameStatus.textContent = '請聽聲音，猜猜它是誰？';
            playCurrentSound();
        }

        function playSound(id, isCurrent = true) {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            const inst = instruments.find(i => i.id === id);
            currentAudio = new Audio(inst.audioFile);
            
            if (isCurrent) {
                playCurrentBtn.classList.add('playing');
                playCurrentBtn.textContent = '⏸️ 正在播放...';
            }
            
            currentAudio.onended = () => {
                playCurrentBtn.classList.remove('playing');
                playCurrentBtn.textContent = '▶️ 播放當前聲音';
                if (isCurrent && gameState.selectedImage) checkBtn.disabled = false;
            };
            currentAudio.play().catch(() => {
                document.getElementById('audioError').style.display = 'block';
                playCurrentBtn.textContent = '❌ 播放失敗';
            });
        }

        function playCurrentSound() { playSound(gameState.currentSound, true); }

        function selectImage(id) {
            if (!gameState.currentSound) return;
            document.querySelectorAll('.instrument-image').forEach(img => img.classList.remove('selected'));
            const target = document.querySelector(`.instrument-image[data-id="${id}"]`);
            target.classList.add('selected');
            gameState.selectedImage = id;
            checkBtn.disabled = false;
        }

        function checkAnswer() {
            const isCorrect = gameState.currentSound === gameState.selectedImage;
            const inst = instruments.find(i => i.id === gameState.currentSound);
            
            if (isCorrect) {
                gameState.score++;
                gameState.answeredQuestions++;
                resultSection.className = 'result-section result-correct show';
                document.getElementById('resultIcon').textContent = '🎉';
                document.getElementById('resultTitle').textContent = '答對了！你好棒！';
            } else {
                resultSection.className = 'result-section result-incorrect show';
                document.getElementById('resultIcon').textContent = '💡';
                document.getElementById('resultTitle').textContent = '差一點點就對了';
            }
            
            document.getElementById('resultText').textContent = isCorrect ? `你成功認出了 ${inst.name}！` : `這是 ${inst.name} 的聲音哦！`;
            document.getElementById('instrumentInfo').innerHTML = `<b>關於 ${inst.name}：</b><br>${inst.description}`;
            
            updateScore();
            updateProgress();
            checkBtn.disabled = true;
            nextBtn.disabled = (gameState.usedSounds.length === gameState.totalQuestions);
            
            if (gameState.usedSounds.length === gameState.totalQuestions) endGame();
        }

        function updateScore() { scoreElement.textContent = gameState.score; }
        function updateProgress() { progressFill.style.width = `${(gameState.usedSounds.length / gameState.totalQuestions) * 100}%`; }

        function endGame() {
            setTimeout(() => {
                alert(`太棒了！你完成了所有挑戰！\n最終得分：${gameState.score} / ${gameState.totalQuestions}`);
                gameStatus.textContent = '遊戲結束！點擊重新開始再來一局吧！';
            }, 1000);
        }

        playCurrentBtn.onclick = playCurrentSound;
        playRandomBtn.onclick = () => playSound(instruments[Math.floor(Math.random()*7)].id, false);
        checkBtn.onclick = checkAnswer;
        resetBtn.onclick = initGame;
        nextBtn.onclick = () => {
            resultSection.classList.remove('show');
            nextBtn.disabled = true;
            selectRandomSound();
        };

        window.onload = initGame;

        // 測試功能
        function testAllAudios() { alert("開始音頻測試..."); instruments.forEach(i => new Audio(i.audioFile).load()); }
        function testAllImages() { alert("開始圖片測試..."); instruments.forEach(i => { let img = new Image(); img.src = i.imageFile; }); }
        function showFileList() { alert("需要的檔案：\n" + instruments.map(i => i.audioFile + ", " + i.imageFile).join("\n")); }
    </script>
</body>
</html>
