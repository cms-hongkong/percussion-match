<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 樂器小森林 | 聲音配對遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fffaf0;
            --primary-pink: #ff9a9e;
            --primary-blue: #a1c4fd;
            --correct-green: #81c784;
            --incorrect-red: #ff8a80;
            --accent-orange: #ffb74d;
            --text-color: #5d4037;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'ZCOOL KuaiLe', 'Microsoft JhengHei', cursive;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffe082 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 開始遊戲遮罩 */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 15px 0px #f0d5a0;
            border: 5px solid var(--text-color);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 4px dashed #eee;
        }

        h1 {
            color: var(--primary-pink);
            font-size: 42px;
            text-shadow: 3px 3px 0px #fff, 5px 5px 0px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .subtitle {
            background: #fff0f0;
            color: #d47a7d;
            font-size: 18px;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: bold;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .game-area { grid-template-columns: 1fr; }
        }

        .audio-section {
            background: #fff9f0;
            border-radius: 30px;
            padding: 25px;
            border: 4px solid var(--accent-orange);
            box-shadow: 8px 8px 0px var(--accent-orange);
        }

        .sound-player {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid #eee;
        }

        .audio-btn {
            background: var(--primary-pink);
            border: none;
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 6px 0px #d47a7d;
            transition: all 0.1s;
            margin: 5px;
        }

        .audio-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px #d47a7d; }
        .audio-btn.playing { background: var(--primary-blue); box-shadow: 0 6px 0px #7b9acc; }

        .images-section {
            background: #fff;
            border-radius: 30px;
            padding: 20px;
            border: 4px solid #eee;
        }

        .images-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .image-container { 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.2s;
        }

        .instrument-image {
            width: 100%;
            height: 120px;
            object-fit: contain;
            border: 4px solid #f9f9f9;
            background: #fff;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
        }

        .image-container:hover { transform: scale(1.05); }
        .image-container.correct .instrument-image { border-color: var(--correct-green); background: #e8f5e9; }
        .image-container.wrong .instrument-image { border-color: var(--incorrect-red); background: #ffebee; }

        .image-name {
            display: inline-block;
            margin-top: 5px;
            background: var(--text-color);
            color: white;
            padding: 2px 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .control-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 22px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .reset-btn { background: var(--accent-orange); box-shadow: 0 8px 0px #e6a543; }
        .next-btn { background: var(--primary-blue); box-shadow: 0 8px 0px #8ba7d6; }
        .control-btn:disabled { background: #ccc; box-shadow: 0 8px 0px #bbb; cursor: not-allowed; }

        .result-section {
            text-align: center;
            margin: 20px 0;
            padding: 25px;
            border-radius: 30px;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        .result-section.show { display: block; }
        .result-correct { background: #e8f5e9; border: 4px solid var(--correct-green); }
        .result-incorrect { background: #fff1f0; border: 4px solid var(--primary-pink); }
        .result-icon { font-size: 60px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .score-board {
            background: var(--text-color);
            color: white;
            padding: 20px;
            border-radius: 35px;
            text-align: center;
        }

        .progress-bar {
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff9a9e, #fad0c4); width: 0%; transition: width 0.5s; }

        .other-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .other-btn { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 6px; cursor: pointer; font-size: 12px; }

        footer { text-align: center; margin-top: 30px; padding: 20px; border-top: 2px dashed #ccc; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="font-size: 50px; margin-bottom: 30px;">🎵 樂器小森林 🌲</h1>
        <p style="font-size: 20px; margin-bottom: 40px; color: #888;">準備好聽聽大自然的音樂了嗎？</p>
        <button class="control-btn" style="background: var(--correct-green); box-shadow: 0 10px 0 #66a669; font-size: 30px; padding: 20px 60px;" onclick="startGame()">開始挑戰！</button>
    </div>

    <div class="container">
        <div class="header">
            <h1>樂器聲音配對</h1>
            <p class="subtitle">點擊圖片直接回答問題吧！</p>
        </div>
        
        <div class="game-area">
            <div class="audio-section">
                <div class="sound-player">
                    <div class="sound-title">正在挑戰：<span id="currentSoundNumber" style="color:var(--primary-pink)">第 1 題</span></div>
                    <button class="audio-btn" id="playCurrentBtn">▶️ 播放聲音</button>
                    <div id="gameStatus" style="margin-top: 10px; font-size: 14px;">點擊右圖回答問題</div>
                </div>
                <div class="other-sounds">
                    <p style="text-align:center; font-size:12px; color:#888; margin-top:15px;">🔍 聽聽看練習：</p>
                    <div class="other-buttons" id="otherButtons"></div>
                </div>
            </div>
            
            <div class="images-section">
                <div class="images-grid" id="imagesGrid"></div>
            </div>
        </div>
        
        <div class="result-section" id="resultSection">
            <div class="result-icon" id="resultIcon">🎉</div>
            <h2 id="resultTitle">答案正確！</h2>
            <p id="resultText">你好棒！</p>
            <div id="instrumentInfo" style="margin-top: 10px;"></div>
        </div>

        <div class="control-buttons">
            <button class="control-btn next-btn" id="nextBtn" disabled>⏭️ 下一題</button>
            <button class="control-btn reset-btn" id="resetBtn">🔄 重新開始</button>
        </div>
        
        <div class="score-board">
            <div>得分：<span id="score">0</span> / <span id="total">7</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <footer>
            <p>樂器：三角、雙擊木、銅鈸、砂槌、馬鈴、小鼓、搖鼓</p>
        </footer>
    </div>

    <script>
        const instruments = [
            { id: 'triangle', name: '三角', audioFile: 'triangle.mp3', imageFile: 'triangle.jpg', description: '金屬清脆的聲音。' },
            { id: 'claves', name: '雙擊木', audioFile: 'claves.mp3', imageFile: 'claves.jpg', description: '木頭清脆的敲擊聲。' },
            { id: 'cymbal', name: '銅鈸', audioFile: 'cymbal.mp3', imageFile: 'cymbal.jpg', description: '響亮震動的聲音。' },
            { id: 'maracas', name: '砂槌', audioFile: 'maracas.mp3', imageFile: 'maracas.jpg', description: '沙沙的搖晃聲。' },
            { id: 'sleigh_bells', name: '馬鈴', audioFile: 'sleigh_bells.mp3', imageFile: 'sleigh_bells.jpg', description: '叮鈴鈴的鈴鐺聲。' },
            { id: 'snare_drum', name: '小鼓', audioFile: 'snare_drum.mp3', imageFile: 'snare_drum.jpg', description: '嗒嗒嗒的鼓點聲。' },
            { id: 'tam', name: '搖鼓', audioFile: 'tam.mp3', imageFile: 'tam.jpg', description: '帶鈴片的清脆聲。' }
        ];

        let gameState = {
            currentSound: null,
            score: 0,
            answeredQuestions: 0,
            usedSounds: [],
            isRoundLocked: false
        };

        let currentAudio = null;

        function startGame() {
            document.getElementById('startOverlay').style.display = 'none';
            initGame();
        }

        function initGame() {
            gameState = {
                currentSound: null,
                score: 0,
                answeredQuestions: 0,
                usedSounds: [],
                isRoundLocked: false
            };
            updateUI();
            createImageGrid();
            createOtherButtons();
            selectNextQuestion();
        }

        function createImageGrid() {
            const grid = document.getElementById('imagesGrid');
            grid.innerHTML = '';
            [...instruments].sort(() => Math.random() - 0.5).forEach(inst => {
                const container = document.createElement('div');
                container.className = 'image-container';
                container.id = 'container-' + inst.id;
                container.onclick = () => handleSelection(inst.id);
                
                const img = document.createElement('img');
                img.className = 'instrument-image';
                img.src = inst.imageFile;
                img.onerror = () => { img.src = `https://via.placeholder.com/100?text=${inst.name}`; };
                
                const label = document.createElement('div');
                label.className = 'image-name';
                label.textContent = inst.name;
                
                container.appendChild(img);
                container.appendChild(label);
                grid.appendChild(container);
            });
        }

        function createOtherButtons() {
            const container = document.getElementById('otherButtons');
            container.innerHTML = '';
            instruments.forEach(inst => {
                const btn = document.createElement('button');
                btn.className = 'other-btn';
                btn.textContent = inst.name;
                btn.onclick = () => playSound(inst.audioFile);
                container.appendChild(btn);
            });
        }

        function selectNextQuestion() {
            const remaining = instruments.filter(i => !gameState.usedSounds.includes(i.id));
            if (remaining.length === 0) return endGame();
            
            const selected = remaining[Math.floor(Math.random() * remaining.length)];
            gameState.currentSound = selected;
            gameState.usedSounds.push(selected.id);
            gameState.isRoundLocked = false;
            
            document.getElementById('currentSoundNumber').textContent = `第 ${gameState.usedSounds.length} 題`;
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('nextBtn').disabled = true;
            document.querySelectorAll('.image-container').forEach(el => el.className = 'image-container');
            
            playSound(selected.audioFile, true);
        }

        function playSound(file, isMain = false) {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            currentAudio = new Audio(file);
            if (isMain) {
                const btn = document.getElementById('playCurrentBtn');
                btn.classList.add('playing');
                btn.textContent = '⏸️ 正在播放...';
                currentAudio.onended = () => {
                    btn.classList.remove('playing');
                    btn.textContent = '▶️ 播放聲音';
                };
            }
            currentAudio.play().catch(e => console.log("播放被攔截或檔案遺失"));
        }

        function handleSelection(selectedId) {
            if (gameState.isRoundLocked) return;
            
            gameState.isRoundLocked = true;
            const isCorrect = selectedId === gameState.currentSound.id;
            const selectedContainer = document.getElementById('container-' + selectedId);
            const correctContainer = document.getElementById('container-' + gameState.currentSound.id);
            
            if (isCorrect) {
                gameState.score++;
                selectedContainer.classList.add('correct');
            } else {
                selectedContainer.classList.add('wrong');
                correctContainer.classList.add('correct'); // 顯示正確答案
            }
            
            showResult(isCorrect);
        }

        function showResult(isCorrect) {
            const section = document.getElementById('resultSection');
            section.className = `result-section show ${isCorrect ? 'result-correct' : 'result-incorrect'}`;
            document.getElementById('resultIcon').textContent = isCorrect ? '🎉' : '💡';
            document.getElementById('resultTitle').textContent = isCorrect ? '太棒了！答對囉！' : '哎呀，再接再厲！';
            document.getElementById('resultText').textContent = isCorrect ? `你成功認出了 ${gameState.currentSound.name}！` : `正確答案是 ${gameState.currentSound.name}。`;
            document.getElementById('instrumentInfo').textContent = gameState.currentSound.description;
            
            gameState.answeredQuestions++;
            updateUI();
            document.getElementById('nextBtn').disabled = false;
        }

        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('total').textContent = instruments.length;
            document.getElementById('progressFill').style.width = `${(gameState.usedSounds.length / instruments.length) * 100}%`;
        }

        function endGame() {
            alert(`恭喜！挑戰完成！\n最終得分：${gameState.score} / ${instruments.length}`);
            initGame();
        }

        document.getElementById('playCurrentBtn').onclick = () => playSound(gameState.currentSound.audioFile, true);
        document.getElementById('nextBtn').onclick = selectNextQuestion;
        document.getElementById('resetBtn').onclick = initGame;
    </script>
</body>
</html>
