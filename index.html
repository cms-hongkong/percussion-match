<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 樂器小森林 | 聲音配對遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-soft: #FFDEE9;
            --secondary-soft: #B5FFFC;
            --accent-pink: #FF9A9E;
            --accent-blue: #74EBD5;
            --text-color: #5A4A4A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'ZCOOL KuaiLe', 'Microsoft JhengHei', cursive;
        }

        body {
            /* 換成超可愛的漸層背景 */
            background-image: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        /* 裝飾背景的小圓圈 */
        body::before {
            content: "♪ ♫";
            position: fixed;
            top: 10%; left: 5%;
            font-size: 5rem;
            color: rgba(255, 154, 158, 0.2);
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px; /* 超圓潤角 */
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 8px solid #FFF; /* 像相框一樣 */
        }

        /* 標題區域：果凍感 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #FF7EB3;
            font-size: 42px;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .subtitle {
            background: var(--secondary-soft);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
            color: #4A90E2;
            font-weight: bold;
        }

        /* 遊戲說明：像筆記本一樣 */
        .instructions {
            background: #FFF9E3;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 30px;
            border: 3px dashed #FFD93D;
            position: relative;
        }

        /* 遊戲區域 */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        /* 圖片區：像郵票一樣 */
        .images-section {
            background: #FFF;
            border-radius: 30px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.03);
        }

        .instrument-image {
            width: 100%;
            height: 140px;
            object-fit: contain;
            cursor: pointer;
            border: 4px solid #F0F0F0;
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fafafa;
        }

        .instrument-image:hover {
            transform: scale(1.1) rotate(3deg);
            border-color: var(--accent-pink);
            background: #FFF0F5;
        }

        .instrument-image.selected {
            border-color: #4CAF50;
            background: #E8F5E9;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        /* 音頻區域：圓滾滾的按鈕 */
        .sound-player {
            background: linear-gradient(to bottom, #ffffff, #f9f9f9);
            border-radius: 30px;
            padding: 25px;
            border: 4px solid #E0F7FA;
        }

        .audio-btn {
            background: #FF9A9E;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 18px;
            box-shadow: 0 6px 0px #E57373;
            transition: all 0.2s;
        }

        .audio-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #E57373;
        }

        /* 控制按鈕：糖果感 */
        .control-btn {
            border-radius: 30px;
            border: none;
            color: white;
            padding: 15px 35px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }

        .check-btn { background: #A8E6CF; color: #3B7A57; }
        .reset-btn { background: #FFD3B6; color: #8B5E3C; }
        .next-btn { background: #DCEDC1; color: #556B2F; }

        .control-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.05);
            filter: brightness(1.05);
        }

        /* 進度條：彩虹感 */
        .progress-bar {
            height: 25px;
            background: #EEE;
            border-radius: 50px;
            border: 3px solid #FFF;
        }

        .progress-fill {
            background: linear-gradient(90deg, #FF9A9E, #FAD0C4, #A18CD1);
            border-radius: 50px;
        }

        /* 結果顯示動畫 */
        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .result-section.show {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 30px;
        }

        /* 其他聲音按鈕 */
        .other-btn {
            background: #E3F2FD;
            border: 2px solid #BBDEFB;
            border-radius: 15px;
            color: #1976D2;
        }

        footer {
            background: rgba(255,255,255,0.5);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }

        /* 手機適應 */
        @media (max-width: 768px) {
            .game-area { grid-template-columns: 1fr; }
            h1 { font-size: 30px; }
        }
    </style>
</head>
